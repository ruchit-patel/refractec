x-image: &image
  build:
    context: .
    dockerfile: Dockerfile
  image: refractec:latest
  restart: unless-stopped

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*depends_on_configurator, *image]
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs

services:
  # --- Infrastructure ---
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  # --- One-time configurator (writes site config, then exits) ---
  configurator:
    <<: *image
    restart: on-failure
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host mariadb;
        bench set-config -gp db_port 3306;
        bench set-config -g redis_cache "redis://redis-cache:6379";
        bench set-config -g redis_queue "redis://redis-queue:6379";
        bench set-config -g redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port 9000;
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  # --- Frappe Backend (Gunicorn) ---
  backend:
    <<: *backend_defaults

  # --- Nginx Frontend (serves assets + reverse proxy) ---
  frontend:
    <<: *image
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      - backend
      - websocket

  # --- Socket.IO ---
  websocket:
    <<: [*depends_on_configurator, *image]
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  # --- Background Workers ---
  queue-short:
    <<: *backend_defaults
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
    command: bench worker --queue long,default,short

  # --- Scheduler ---
  scheduler:
    <<: *backend_defaults
    command: bench schedule

  # --- Site Creator (one-time, creates site if not exists) ---
  create-site:
    <<: *image
    restart: "no"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        if [ ! -f "sites/${FRAPPE_SITE:-refractec.site}/site_config.json" ]; then
          echo "Creating site ${FRAPPE_SITE:-refractec.site}...";
          bench new-site ${FRAPPE_SITE:-refractec.site} --db-host mariadb --db-root-password ${DB_PASSWORD:-changeme} --admin-password ${ADMIN_PASSWORD:-admin} --mariadb-root-username root --mariadb-user-host-login-scope='%' --force --install-app refractec;
          echo "Site created.";
        else
          echo "Site already exists, running migrate...";
          bench --site ${FRAPPE_SITE:-refractec.site} migrate;
        fi
    depends_on:
      configurator:
        condition: service_completed_successfully

volumes:
  mariadb-data:
  redis-queue-data:
  sites:
  logs:
