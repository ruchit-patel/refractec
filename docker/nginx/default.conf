upstream frappe-backend {
    server backend:8000 fail_timeout=0;
}

upstream frappe-socketio {
    server socketio:9000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;
    client_body_buffer_size 16k;

    # Serve static assets directly from the sites volume
    location /assets {
        alias /home/frappe/frappe-bench/sites/assets;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Serve uploaded files
    location /files {
        alias /home/frappe/frappe-bench/sites/refractec.site/public/files;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location /private/files {
        internal;
        alias /home/frappe/frappe-bench/sites/refractec.site/private/files;
        try_files $uri =404;
    }

    # Socket.IO
    location /socket.io {
        proxy_pass http://frappe-socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Frappe-Site-Name refractec.site;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # All other requests go to Frappe/Gunicorn
    location / {
        proxy_pass http://frappe-backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name refractec.site;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
